<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Truco Cassino UI</title>

<link rel="icon" href="data:,">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="avisoOrientacao" class="avisoOrientacao">
  Vire o aparelho para jogar na horizontal.
</div>

<div id="gameWrapper" style="width: 100vw; height: 100dvh; min-height: 100%;">

  <div class="mesa"></div>

  <div id="game">
    <div id="vira" class="carta viraCarta"></div>

    <!-- jogadores -->
    <div class="player" id="p0"><div class="avatar avatar-voce"></div>Você</div>
    <div class="player" id="p1"><div class="avatar avatar-bot1"></div>Bot 1</div>
    <div class="player" id="p2"><div class="avatar avatar-parceiro"></div>Parceiro</div>
    <div class="player" id="p3"><div class="avatar avatar-bot2"></div>Bot 2</div>

    <!-- mãos bots -->
    <div id="hand1" class="botHand"></div>
    <div id="hand2" class="botHand"></div>
    <div id="hand3" class="botHand"></div>

    <!-- mesa -->
    <div id="mesaCartas"></div>
  </div>

  <div id="ui">
    <div id="mensagem"></div>
    <div id="painelHistorico" aria-label="Histórico das rodadas">
      <div id="historicoRodadas"></div>
    </div>
    <div id="placar"></div>
    <div id="chamadaTruco" class="chamadaTruco oculto">TRUCO!</div>
    <div id="acoesTruco" class="acoesTruco oculto">
      <button id="btnAceitarTruco" type="button">Aceitar</button>
      <button id="btnAumentarTruco" type="button">Aumentar</button>
      <button id="btnCorrerTruco" type="button">Correr</button>
    </div>

    <!-- 🔥 TRUCO -->
    <button id="btnTruco" onclick="pedirTruco()">TRUCO</button>
    <button id="btnCorrer" onclick="correr()">CORRER</button>
    <div id="mao"></div>
  </div>

</div>

<!-- tela final -->
<div id="telaFinal" class="telaFinal">
  <div id="textoFinal"></div>
</div>

<script src="js/bootstrap.js"></script>
<script src="js/cards.js"></script>
<script src="js/script.js"></script>

</body>
</html>
