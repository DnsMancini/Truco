<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Truco Cassino UI</title>

<link rel="icon" href="data:,">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="avisoOrientacao" class="avisoOrientacao">
  Vire o aparelho para jogar na horizontal.
</div>

<div id="gameWrapper" style="width: 100vw; height: 100vh;">

  <div class="mesa">

    <div id="vira" class="carta viraCarta"></div>

    <div id="mensagem"></div>
    <div id="painelRodada">
      <div id="infoRodada"></div>
      <div id="trucoStatus">Truco: Nenhum</div>
    </div>
    <div id="painelHistorico">
      <div class="painelTitulo">HISTÓRICO</div>
      <div id="historicoRodadas"></div>
    </div>
    <div id="placar"></div>
    <div id="balaoTruco" class="balaoTruco oculto">
      <div id="balaoTrucoTexto"></div>
      <div class="balaoTrucoAcoes">
        <button id="btnBalaoSim" type="button">Sim</button>
        <button id="btnBalaoNao" type="button">Não</button>
      </div>
    </div>

    <!-- 🔥 TRUCO -->
    <button id="btnTruco" onclick="pedirTruco()">TRUCO</button>
    <button id="btnCorrer" onclick="correr()">CORRER</button>

    <!-- jogadores -->
    <div class="player" id="p0"><div class="avatar avatar-voce"></div>Você</div>
    <div class="player" id="p1"><div class="avatar avatar-bot1"></div>Bot 1</div>
    <div class="player" id="p2"><div class="avatar"></div>Parceiro</div>
    <div class="player" id="p3"><div class="avatar avatar-bot2"></div>Bot 2</div>

    <!-- mãos bots -->
    <div id="hand1" class="botHand"></div>
    <div id="hand2" class="botHand"></div>
    <div id="hand3" class="botHand"></div>

    <!-- mesa -->
    <div id="mesaCartas"></div>
    <div id="mao"></div>

  </div>

</div>

<!-- tela final -->
<div id="telaFinal" class="telaFinal">
  <div id="textoFinal"></div>
</div>

<script>
function checkOrientation() {
  const aviso = document.getElementById("avisoOrientacao");
  const game = document.getElementById("gameWrapper");

  if (window.innerHeight > window.innerWidth) {
    // vertical
    aviso.style.display = "flex";
    game.style.display = "none";
  } else {
    // horizontal
    aviso.style.display = "none";
    game.style.display = "block";
  }
}

window.addEventListener("resize", checkOrientation);
window.addEventListener("load", checkOrientation);
</script>

<script src="js/script.js"></script>

</body>
</html>
